<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Günlük Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text: #1A1917;
    --text-muted: #7A7870;
    --text-faint: #B0AEA8;
    --green: #2D6A4F;
    --green-bg: #EAF4EE;
    --amber: #92400E;
    --amber-bg: #FEF3C7;
    --red: #991B1B;
    --red-bg: #FEE2E2;
    --accent: #1A1917;
    --radius: 14px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1E1D1B;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.13);
      --text: #F0EDE8;
      --text-muted: #8A8880;
      --text-faint: #4A4845;
      --green: #6EE7A0;
      --green-bg: #0D2E1E;
      --amber: #FCD34D;
      --amber-bg: #2A1F06;
      --red: #FCA5A5;
      --red-bg: #2A0E0E;
      --accent: #F0EDE8;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 3rem;
  }

  header {
    padding: 2rem 1.25rem 1rem;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1.5rem;
  }

  .day-name {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .date-line {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 300;
  }

  .page { padding: 0 1.25rem; }

  .section { margin-bottom: 2rem; }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  /* Habit cards */
  .habit-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: transform 0.1s;
  }

  .habit-card:active { transform: scale(0.985); }

  .habit-info { flex: 1; min-width: 0; }

  .habit-name {
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
  }

  .streak-dots {
    display: flex;
    gap: 4px;
    margin-top: 6px;
    align-items: center;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border-strong);
    flex-shrink: 0;
  }

  .dot.hit { background: var(--green); opacity: 0.75; }
  .dot.today-hit { background: var(--green); opacity: 1; width: 9px; height: 9px; }

  .streak-count {
    font-size: 11px;
    color: var(--text-faint);
    margin-left: 4px;
  }

  .habit-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 7px 16px;
    border-radius: 100px;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .habit-btn:hover { background: var(--bg); }

  .habit-btn.done {
    background: var(--green-bg);
    color: var(--green);
    border-color: transparent;
    font-weight: 500;
  }

  /* Shower card */
  .shower-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .shower-info { flex: 1; }

  .shower-title {
    font-size: 15px;
    color: var(--text);
  }

  .shower-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
    font-weight: 300;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 100px;
    flex-shrink: 0;
  }

  .pill-ok { background: var(--green-bg); color: var(--green); }
  .pill-warn { background: var(--amber-bg); color: var(--amber); }
  .pill-due { background: var(--red-bg); color: var(--red); }

  .shower-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 100px;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .shower-btn:hover { background: var(--bg); }
  .shower-btn:active { transform: scale(0.97); }

  /* Task cards */
  .task-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .task-card:active { transform: scale(0.985); }

  .task-card.done-task { opacity: 0.38; }

  .check-circle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .check-circle.checked {
    background: var(--green);
    border-color: var(--green);
  }

  .checkmark {
    display: none;
    width: 5px;
    height: 9px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }

  .check-circle.checked .checkmark { display: block; }

  .task-text {
    flex: 1;
    font-size: 15px;
    color: var(--text);
    line-height: 1.4;
  }

  .done-task .task-text {
    text-decoration: line-through;
    color: var(--text-faint);
  }

  /* Summary bar */
  .summary {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .summary-label {
    font-size: 13px;
    color: var(--text-muted);
  }

  .summary-count {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .summary-sub {
    font-size: 11px;
    color: var(--text-faint);
  }

  .divider {
    width: 0.5px;
    height: 32px;
    background: var(--border);
  }

  .summary-item { text-align: center; }

  /* Sync status */
  .header-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .header-info { flex: 1; min-width: 0; }
  .sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 6px;
    flex-shrink: 0;
  }
  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-faint);
    transition: background 0.2s;
  }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.syncing { background: var(--amber); animation: pulse 1.2s ease-in-out infinite; }
  .sync-dot.err { background: var(--red); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .sync-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 100px;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
  }
  .sync-btn:hover { background: var(--bg); }

  /* Water tracker */
  .water-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .water-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  .cup {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1.5px solid var(--border-strong);
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .cup.filled { background: #5BA8C4; border-color: transparent; }
  .cup:active { transform: scale(0.9); }
  .water-count {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 2px;
    white-space: nowrap;
  }

  /* Editable grooming time */
  .editable-time {
    cursor: pointer;
    text-decoration: underline dotted var(--text-faint);
  }

  /* Quick time picker */
  .quick-time-picker { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .quick-time-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 100px;
    border: 0.5px solid var(--border-strong);
    background: var(--bg);
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
  }
  .quick-time-btn:active { opacity: 0.6; }

  /* Grooming overdue */
  .grooming-overdue { border-left: 2.5px solid var(--red) !important; }
  .grooming-time-overdue { color: var(--red) !important; font-weight: 500; }

  /* Warn threshold config (edit mode) */
  .warn-config { display: flex; align-items: center; gap: 5px; margin-top: 6px; }
  .warn-label { font-size: 11px; color: var(--text-faint); }
  .warn-input {
    width: 52px;
    border: 0.5px solid var(--border-strong);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 2px 4px;
    text-align: center;
  }

  /* Completed tasks section */
  .done-toggle {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-faint);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 10px 0 4px;
    width: 100%;
    text-align: left;
    display: block;
  }
  .done-toggle:hover { color: var(--text-muted); }

  /* Edit mode */
  .edit-toggle-wrap {
    text-align: center;
    margin-top: 2rem;
  }
  .edit-toggle {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 8px 16px;
    transition: color 0.15s;
  }
  .edit-toggle:hover { color: var(--text-muted); }
  body.editing .edit-toggle { color: var(--text); }

  body.editing .habit-btn,
  body.editing .check-circle { display: none; }
  body.editing .task-card { cursor: default; }
  body.editing .task-card:active { transform: none; }

  .delete-btn {
    display: none;
    background: transparent;
    border: 0.5px solid var(--red);
    color: var(--red);
    border-radius: 100px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    flex-shrink: 0;
    white-space: nowrap;
  }
  body.editing .delete-btn { display: inline-flex; align-items: center; }

  .adder-card { display: none; margin-top: 6px; }
  body.editing .adder-card { display: block; }
  .adder-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s;
  }
  .adder-btn:hover { background: var(--bg); }
  .adder-input-card {
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .adder-input-card input {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="header-info">
      <div class="day-name" id="dayName"></div>
      <div class="date-line" id="dateLine"></div>
    </div>
    <div class="sync-status" id="syncStatus"></div>
  </div>
</header>

<div class="page">

  <div class="section" id="summarySection">
    <div class="summary" id="summaryBar">
      <div class="summary-item">
        <div class="summary-count" id="sumDone">0</div>
        <div class="summary-sub">bugün yapıldı</div>
      </div>
      <div class="divider"></div>
      <div class="summary-item">
        <div class="summary-count" id="sumStreak">0</div>
        <div class="summary-sub">en uzun seri</div>
      </div>
      <div class="divider"></div>
      <div class="summary-item">
        <div class="summary-count" id="sumWeek">0</div>
        <div class="summary-sub">bu hafta</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Alışkanlıklar</div>
    <div id="habitsContainer"></div>
  </div>

  <div class="section">
    <div class="section-label">Bakım</div>
    <div id="groomingContainer"></div>
  </div>

  <div class="section">
    <div class="section-label">Su</div>
    <div class="water-card">
      <div id="waterCups" class="water-row"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Yapmak İstediklerim</div>
    <div id="tasksContainer"></div>
  </div>

  <div class="edit-toggle-wrap">
    <button class="edit-toggle" id="editToggle" onclick="toggleEditMode()">Düzenle</button>
  </div>

</div>

<script>
const DEFAULT_HABITS = [
  { id: 'muzik',    name: 'Müzik' },
  { id: 'ders',     name: 'Ders çalışma' },
  { id: 'spor',     name: 'Spor' },
  { id: 'cilt',     name: 'Cilt bakımı' },
  { id: 'dis',      name: 'Diş fırçalama' },
  { id: 'uyku',     name: 'Uyku (8 saat)' },
  { id: 'gunluk',   name: 'Günlük tutmak' },
  { id: 'kitap',    name: 'Kitap okuma' }
];

const DEFAULT_TASKS = [
  { id: 'saglik',  text: 'Yakınların sağlık takibi' },
  { id: 'denklik', text: 'Denklik süreci' }
];

const DEFAULT_GROOMING = [
  { id: 'dus',   name: 'Duş',          btnText: 'Şimdi aldım',  warnAfterHours: 48  },
  { id: 'sakal', name: 'Sakal tıraşı', btnText: 'Şimdi yaptım', warnAfterHours: 48  },
  { id: 'vucut', name: 'Vücut',         btnText: 'Şimdi yaptım', warnAfterHours: 168 },
  { id: 'sac',   name: 'Saç tıraşı',   btnText: 'Şimdi yaptım', warnAfterHours: 504 },
];

const WATER_GOAL = 8;

let HABITS = [];
let TASKS = [];
let GROOMING_LIST = [];
let editMode = false;
let doneOpen = false;

const DRIVE_CLIENT_ID = '636563505234-5jcjem80bu2e4jriqfsfgbfg7l40hlnn.apps.googleusercontent.com';
const DRIVE_FILE_NAME = 'panel_v2.json';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

let driveToken = null;
let driveFileId = null;
let drivePushTimer = null;
let driveTokenClient = null;

function pad(n) { return String(n).padStart(2, '0'); }

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function dayKey(offset) {
  const d = new Date();
  d.setDate(d.getDate() - offset);
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function migrate() {
  let raw;
  try { raw = localStorage.getItem('panel_v2'); } catch(e) { return; }
  if (!raw) return;
  let s;
  try { s = JSON.parse(raw); } catch(e) { return; }
  if (!s.habits) return;
  const migrated = {};
  let changed = false;
  Object.keys(s.habits).forEach(k => {
    const parts = k.split('-');
    if (parts.length !== 3) { migrated[k] = s.habits[k]; return; }
    const normalized = parts[0] + '-' + parts[1].padStart(2, '0') + '-' + parts[2].padStart(2, '0');
    if (normalized !== k) changed = true;
    migrated[normalized] = Object.assign({}, migrated[normalized] || {}, s.habits[k]);
  });
  if (changed) {
    s.habits = migrated;
    try { localStorage.setItem('panel_v2', JSON.stringify(s)); } catch(e) {}
  }
  // shower → grooming migration
  if (s.shower !== undefined) {
    if (!s.grooming) s.grooming = {};
    if (!s.grooming.dus) s.grooming.dus = s.shower;
    delete s.shower;
    try { localStorage.setItem('panel_v2', JSON.stringify(s)); } catch(e) {}
  }
}

function load() {
  try { return JSON.parse(localStorage.getItem('panel_v2') || '{}'); }
  catch(e) { return {}; }
}

function save(s) {
  s._lastModified = Date.now();
  try { localStorage.setItem('panel_v2', JSON.stringify(s)); } catch(e) {}
  drivePush();
}

function recordDeletion(id) {
  const s = load();
  if (!s.deletedIds) s.deletedIds = {};
  s.deletedIds[id] = Date.now();
  save(s);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function loadLists() {
  const s = load();
  HABITS       = Array.isArray(s.habitList)    ? s.habitList    : DEFAULT_HABITS.map(h => ({ ...h }));
  TASKS        = Array.isArray(s.taskList)     ? s.taskList     : DEFAULT_TASKS.map(t => ({ ...t }));
  GROOMING_LIST = (Array.isArray(s.groomingList) ? s.groomingList : DEFAULT_GROOMING.map(g => ({ ...g })))
    .map(g => ({ warnAfterHours: 48, ...g }));
  if (!Array.isArray(s.habitList) || !Array.isArray(s.taskList) || !Array.isArray(s.groomingList)) saveLists();
}

function saveLists() {
  const s = load();
  s.habitList    = HABITS;
  s.taskList     = TASKS;
  s.groomingList = GROOMING_LIST;
  save(s);
}

function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('editing', editMode);
  document.getElementById('editToggle').textContent = editMode ? 'Bitti' : 'Düzenle';
  renderHabits();
  renderGrooming();
  renderTasks();
}

function startAddHabit() {
  const adder = document.getElementById('habitAdder');
  adder.innerHTML = '<div class="adder-input-card"><input id="habitInput" placeholder="Alışkanlık adı..." /></div>';
  const input = document.getElementById('habitInput');
  input.focus();
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); confirmAddHabit(); }
    else if (e.key === 'Escape') { e.preventDefault(); renderHabits(); }
  };
  input.onblur = () => {
    if (document.getElementById('habitInput') === input) renderHabits();
  };
}

function confirmAddHabit() {
  const input = document.getElementById('habitInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) { renderHabits(); return; }
  input.onblur = null;
  HABITS.push({ id: 'h' + Date.now() + Math.floor(Math.random() * 1000), name: val });
  saveLists();
  renderHabits();
}

function deleteHabit(id) {
  const h = HABITS.find(x => x.id === id);
  if (!h) return;
  if (!confirm('"' + h.name + '" silinsin mi?')) return;
  HABITS = HABITS.filter(x => x.id !== id);
  recordDeletion(id);
  saveLists();
  renderHabits();
}

function startAddTask() {
  const adder = document.getElementById('taskAdder');
  adder.innerHTML = '<div class="adder-input-card"><input id="taskInput" placeholder="Ne yapmak istiyorsun?" /></div>';
  const input = document.getElementById('taskInput');
  input.focus();
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); confirmAddTask(); }
    else if (e.key === 'Escape') { e.preventDefault(); renderTasks(); }
  };
  input.onblur = () => {
    if (document.getElementById('taskInput') === input) renderTasks();
  };
}

function confirmAddTask() {
  const input = document.getElementById('taskInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) { renderTasks(); return; }
  input.onblur = null;
  TASKS.push({ id: 't' + Date.now() + Math.floor(Math.random() * 1000), text: val });
  saveLists();
  renderTasks();
}

function deleteTask(id) {
  const t = TASKS.find(x => x.id === id);
  if (!t) return;
  if (!confirm('"' + t.text + '" silinsin mi?')) return;
  TASKS = TASKS.filter(x => x.id !== id);
  recordDeletion(id);
  saveLists();
  renderTasks();
}

function isHabitDone(id) {
  const s = load();
  return !!(s.habits && s.habits[todayKey()] && s.habits[todayKey()][id]);
}

function toggleHabit(id) {
  if (editMode) return;
  const s = load();
  if (!s.habits) s.habits = {};
  if (!s.habits[todayKey()]) s.habits[todayKey()] = {};
  s.habits[todayKey()][id] = !s.habits[todayKey()][id];
  save(s);
  renderHabits();
  renderSummary();
}

function getStreak7(id) {
  const s = load();
  const dots = [];
  for (let i = 6; i >= 0; i--) {
    const k = dayKey(i);
    const hit = !!(s.habits && s.habits[k] && s.habits[k][id]);
    dots.push({ hit, today: i === 0 });
  }
  return dots;
}

function getLongestStreak(id) {
  const s = load();
  if (!s.habits) return 0;
  const dates = Object.keys(s.habits)
    .filter(k => s.habits[k][id])
    .map(k => {
      const [y, m, d] = k.split('-').map(Number);
      return new Date(y, m - 1, d).getTime();
    })
    .sort((a, b) => a - b);
  let best = 0, cur = 0, prev = null;
  for (const t of dates) {
    if (prev !== null && Math.round((t - prev) / 86400000) === 1) cur++;
    else cur = 1;
    if (cur > best) best = cur;
    prev = t;
  }
  return best;
}

function renderHabits() {
  const container = document.getElementById('habitsContainer');
  container.innerHTML = '';
  HABITS.forEach(h => {
    const done = isHabitDone(h.id);
    const dots = getStreak7(h.id);
    const hitCount = dots.filter(d => d.hit).length;

    const card = document.createElement('div');
    card.className = 'habit-card';
    card.innerHTML = `
      <div class="habit-info">
        <div class="habit-name">${escapeHtml(h.name)}</div>
        <div class="streak-dots">
          ${dots.map(d => `<div class="dot ${d.hit && d.today ? 'today-hit' : d.hit ? 'hit' : ''}"></div>`).join('')}
          <span class="streak-count">${hitCount}/7</span>
        </div>
      </div>
      <button class="habit-btn ${done ? 'done' : ''}" onclick="toggleHabit('${h.id}')">
        ${done ? '✓ Yapıldı' : 'Yaptım'}
      </button>
      <button class="delete-btn" onclick="deleteHabit('${h.id}')">Sil</button>
    `;
    container.appendChild(card);
  });
  const adder = document.createElement('div');
  adder.className = 'adder-card';
  adder.id = 'habitAdder';
  adder.innerHTML = '<button class="adder-btn" onclick="startAddHabit()">+ Yeni alışkanlık</button>';
  container.appendChild(adder);
}

function logGrooming(id) {
  const s = load();
  if (!s.grooming) s.grooming = {};
  s.grooming[id] = Date.now();
  save(s);
  renderGrooming();
}

function groomingTimeLabel(ts) {
  const hours = (Date.now() - ts) / 3600000;
  const daysAgo = Math.floor(hours / 24);
  const d = new Date(ts);
  const timeStr = d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  const dateStr = d.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long' });
  if (Math.round(hours) < 1) return 'Az önce';
  if (hours < 24) return Math.round(hours) + ' saat önce';
  if (daysAgo === 1) return 'Dün, ' + timeStr;
  if (daysAgo < 7) return daysAgo + ' gün önce';
  return daysAgo + ' gün önce · ' + dateStr;
}

function tsToDatetimeLocal(ts) {
  const d = new Date(ts);
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
         'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function editGroomingTime(id) {
  const el = document.getElementById('grooming-sub-' + id);
  if (!el) return;
  const opts = [
    ['Az önce',     '0'],
    ['1 saat önce', '3600000'],
    ['2 saat önce', '7200000'],
    ['4 saat önce', '14400000'],
    ['Dün sabah',   'yesterday-morning'],
    ['Dün akşam',   'yesterday-evening'],
    ['2 gün önce',  '172800000'],
  ];
  const btns = opts.map(([label, val]) =>
    `<button class="quick-time-btn" onclick="applyQuickTime('${id}','${val}')">${label}</button>`
  ).join('');
  el.innerHTML = `<div class="quick-time-picker" onclick="event.stopPropagation()">${btns}
    <button class="quick-time-btn" onclick="showCustomGroomingTime('${id}')">Özel...</button>
    <button class="quick-time-btn" onclick="renderGrooming()" style="opacity:0.5">✕</button>
  </div>`;
}

function applyQuickTime(id, offsetStr) {
  let ts;
  if (offsetStr === 'yesterday-morning') {
    const d = new Date(); d.setDate(d.getDate() - 1); d.setHours(8, 0, 0, 0); ts = d.getTime();
  } else if (offsetStr === 'yesterday-evening') {
    const d = new Date(); d.setDate(d.getDate() - 1); d.setHours(20, 0, 0, 0); ts = d.getTime();
  } else {
    ts = Date.now() - Number(offsetStr);
  }
  const s = load();
  if (!s.grooming) s.grooming = {};
  s.grooming[id] = ts;
  save(s);
  renderGrooming();
}

function showCustomGroomingTime(id) {
  const el = document.getElementById('grooming-sub-' + id);
  if (!el) return;
  const s = load();
  const ts = s.grooming && s.grooming[id];
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:6px;margin-top:4px;" onclick="event.stopPropagation()">
      <input type="datetime-local" value="${ts ? tsToDatetimeLocal(ts) : ''}"
        style="flex:1;border:0.5px solid var(--border-strong);border-radius:6px;
               background:var(--bg);font-family:inherit;font-size:12px;
               color:var(--text);padding:4px 6px;"
        onchange="saveGroomingTime('${id}', this.value)" />
      <button class="quick-time-btn" onclick="renderGrooming()">İptal</button>
    </div>`;
}

function saveGroomingTime(id, val) {
  if (!val) { renderGrooming(); return; }
  const ts = new Date(val).getTime();
  if (isNaN(ts)) { renderGrooming(); return; }
  const s = load();
  if (!s.grooming) s.grooming = {};
  s.grooming[id] = ts;
  save(s);
  renderGrooming();
}

function updateWarnHours(id, val) {
  const hours = parseInt(val);
  if (isNaN(hours) || hours < 1) return;
  const g = GROOMING_LIST.find(x => x.id === id);
  if (!g) return;
  g.warnAfterHours = hours;
  saveLists();
}

function startAddGrooming() {
  const adder = document.getElementById('groomingAdder');
  adder.innerHTML = '<div class="adder-input-card"><input id="groomingInput" placeholder="Sayaç adı..." /></div>';
  const input = document.getElementById('groomingInput');
  input.focus();
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); confirmAddGrooming(); }
    else if (e.key === 'Escape') { e.preventDefault(); renderGrooming(); }
  };
  input.onblur = () => { if (document.getElementById('groomingInput') === input) renderGrooming(); };
}

function confirmAddGrooming() {
  const input = document.getElementById('groomingInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) { renderGrooming(); return; }
  input.onblur = null;
  GROOMING_LIST.push({ id: 'g' + Date.now() + Math.floor(Math.random() * 1000), name: val, btnText: 'Şimdi yaptım', warnAfterHours: 48 });
  saveLists();
  renderGrooming();
}

function deleteGrooming(id) {
  const g = GROOMING_LIST.find(x => x.id === id);
  if (!g) return;
  if (!confirm('"' + g.name + '" silinsin mi?')) return;
  GROOMING_LIST = GROOMING_LIST.filter(x => x.id !== id);
  recordDeletion(id);
  saveLists();
  renderGrooming();
}

function renderGrooming() {
  const s = load();
  const container = document.getElementById('groomingContainer');
  container.innerHTML = '';
  GROOMING_LIST.forEach(g => {
    const ts = s.grooming && s.grooming[g.id];
    const subText = ts ? groomingTimeLabel(ts) : 'Henüz kayıt yok';
    const overdue = ts && ((Date.now() - ts) / 3600000) > (g.warnAfterHours || 48);
    const warnConfig = editMode ? `
      <div class="warn-config">
        <span class="warn-label">⏰</span>
        <input type="number" min="1" value="${g.warnAfterHours || 48}" class="warn-input"
          onchange="updateWarnHours('${g.id}', this.value)" />
        <span class="warn-label">saatte uyar</span>
      </div>` : '';
    const card = document.createElement('div');
    card.className = 'shower-card' + (overdue ? ' grooming-overdue' : '');
    card.style.marginBottom = '6px';
    card.innerHTML = `
      <div class="shower-info">
        <div class="shower-title">${escapeHtml(g.name)}</div>
        <div class="shower-sub${ts ? ' editable-time' : ''}${overdue ? ' grooming-time-overdue' : ''}"
             id="grooming-sub-${g.id}"
             ${ts ? `onclick="editGroomingTime('${g.id}')"` : ''}
        >${escapeHtml(subText)}</div>
        ${warnConfig}
      </div>
      <button class="shower-btn" onclick="logGrooming('${g.id}')">${escapeHtml(g.btnText)}</button>
      <button class="delete-btn" onclick="deleteGrooming('${g.id}')">Sil</button>
    `;
    container.appendChild(card);
  });
  const adder = document.createElement('div');
  adder.className = 'adder-card';
  adder.id = 'groomingAdder';
  adder.innerHTML = '<button class="adder-btn" onclick="startAddGrooming()">+ Yeni sayaç</button>';
  container.appendChild(adder);
}

function setWater(count) {
  const s = load();
  if (!s.water) s.water = {};
  s.water[todayKey()] = count;
  save(s);
  renderWater();
}

function renderWater() {
  const s = load();
  const count = (s.water && s.water[todayKey()]) || 0;
  const container = document.getElementById('waterCups');
  let html = '';
  for (let i = 0; i < WATER_GOAL; i++) {
    const filled = i < count;
    const next = filled ? i : i + 1;
    html += `<div class="cup${filled ? ' filled' : ''}" onclick="setWater(${next})"></div>`;
  }
  html += `<span class="water-count">${count}/${WATER_GOAL} bardak</span>`;
  container.innerHTML = html;
}

function isTaskDone(id) {
  const s = load();
  return !!(s.tasks && s.tasks[id]);
}

function toggleTask(id) {
  if (editMode) return;
  const s = load();
  if (!s.tasks) s.tasks = {};
  s.tasks[id] = !s.tasks[id];
  save(s);
  renderTasks();
}

function makeTaskCard(t, done) {
  const card = document.createElement('div');
  card.className = 'task-card' + (done ? ' done-task' : '');
  card.onclick = (e) => {
    if (editMode) return;
    if (e.target.closest('.delete-btn')) return;
    toggleTask(t.id);
  };
  card.innerHTML = `
    <div class="check-circle ${done ? 'checked' : ''}"><div class="checkmark"></div></div>
    <div class="task-text">${escapeHtml(t.text)}</div>
    <button class="delete-btn" onclick="event.stopPropagation(); deleteTask('${t.id}')">Sil</button>
  `;
  return card;
}

function toggleDoneSection() {
  doneOpen = !doneOpen;
  renderTasks();
}

function renderTasks() {
  const container = document.getElementById('tasksContainer');
  container.innerHTML = '';

  const active = TASKS.filter(t => !isTaskDone(t.id));
  const done   = TASKS.filter(t =>  isTaskDone(t.id));

  active.forEach(t => container.appendChild(makeTaskCard(t, false)));

  const adder = document.createElement('div');
  adder.className = 'adder-card';
  adder.id = 'taskAdder';
  adder.innerHTML = '<button class="adder-btn" onclick="startAddTask()">+ Yeni</button>';
  container.appendChild(adder);

  if (done.length > 0) {
    const arrow = doneOpen ? '▾' : '▸';
    const toggle = document.createElement('button');
    toggle.className = 'done-toggle';
    toggle.textContent = arrow + ' Tamamlananlar (' + done.length + ')';
    toggle.onclick = toggleDoneSection;
    container.appendChild(toggle);

    if (doneOpen) {
      done.forEach(t => container.appendChild(makeTaskCard(t, true)));
    }
  }
}

function renderSummary() {
  const s = load();
  const today = todayKey();
  const todayHabits = s.habits && s.habits[today] ? s.habits[today] : {};
  const doneCount = Object.values(todayHabits).filter(Boolean).length;

  let weekTotal = 0;
  for (let i = 0; i < 7; i++) {
    const k = dayKey(i);
    const dayHabits = s.habits && s.habits[k] ? s.habits[k] : {};
    weekTotal += Object.values(dayHabits).filter(Boolean).length;
  }

  let bestStreak = 0;
  HABITS.forEach(h => {
    const streak = getLongestStreak(h.id);
    if (streak > bestStreak) bestStreak = streak;
  });

  document.getElementById('sumDone').textContent = doneCount;
  document.getElementById('sumWeek').textContent = weekTotal;
  document.getElementById('sumStreak').textContent = bestStreak;
}

function renderHeader() {
  const d = new Date();
  const days = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  document.getElementById('dayName').textContent = days[d.getDay()];
  document.getElementById('dateLine').textContent = d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function renderAll() {
  loadLists();
  renderHeader();
  renderSummary();
  renderHabits();
  renderGrooming();
  renderWater();
  renderTasks();
}

function setSyncStatus(state, detail) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (state === 'hidden') { el.innerHTML = ''; el.style.display = 'none'; return; }
  el.style.display = 'flex';
  if (state === 'off') {
    el.innerHTML = '<button class="sync-btn" onclick="driveConnect(false)">Drive\'a bağlan</button>';
  } else if (state === 'err') {
    const d = detail ? ` <span style="color:var(--text-faint);font-size:9px;">(${escapeHtml(String(detail))})</span>` : '';
    el.innerHTML = '<span class="sync-dot err"></span><button class="sync-btn" onclick="driveConnect(false)">Tekrar bağlan</button>' + d;
  } else {
    const label = state === 'syncing' ? 'Senkron...' : 'Drive';
    el.innerHTML = `<span class="sync-dot ${state}"></span><span>${label}</span>`;
  }
}

function driveConnect(silent) {
  if (!window.google || !google.accounts || !google.accounts.oauth2) {
    setTimeout(() => driveConnect(silent), 500);
    return;
  }
  if (!driveTokenClient) {
    driveTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: DRIVE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: async (resp) => {
        if (resp && resp.access_token) {
          driveToken = resp.access_token;
          try { localStorage.setItem('panel_drive_enabled', '1'); } catch(e) {}
          setSyncStatus('syncing');
          try {
            driveFileId = await driveFindOrCreate();
            await driveSync();
            setSyncStatus('ok');
          } catch(e) {
            setSyncStatus('err', (e && e.message) || 'sync hatası');
          }
        } else {
          setSyncStatus('err', 'token gelmedi');
        }
      },
      error_callback: (err) => setSyncStatus('err', (err && (err.type || err.message)) || 'oauth')
    });
  }
  setSyncStatus('syncing');
  // Sessiz (otomatik) denemede prompt boş; manuel "Tekrar bağlan"da onay ekranını zorla
  driveTokenClient.requestAccessToken({ prompt: silent ? '' : 'consent' });
}

async function driveFindOrCreate() {
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
  const list = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)&spaces=drive`,
    { headers: { Authorization: `Bearer ${driveToken}` } }
  ).then(r => r.json());
  if (list.files && list.files.length > 0) return list.files[0].id;
  const created = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${driveToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: DRIVE_FILE_NAME, mimeType: 'application/json' })
  }).then(r => r.json());
  return created.id;
}

function mergeMap(a, b, combine) {
  const out = {};
  const keys = new Set([...Object.keys(a || {}), ...Object.keys(b || {})]);
  keys.forEach(k => { out[k] = combine((a || {})[k], (b || {})[k]); });
  return out;
}

function mergeList(a, b, deleted) {
  const result = [];
  const seen = new Set();
  const add = (arr) => (arr || []).forEach(item => {
    if (!item || !item.id) return;
    if (deleted && deleted[item.id]) return;
    if (seen.has(item.id)) return;
    seen.add(item.id);
    result.push(item);
  });
  add(a); add(b);
  return result;
}

// İki cihazın verisini kaybetmeden birleştirir (last-write-wins yerine union)
function mergeState(local, drive) {
  local = local || {};
  drive = drive || {};
  const out = Object.assign({}, drive, local); // bilinmeyen/skaler alanlar için local öncelikli
  const deleted = Object.assign({}, drive.deletedIds, local.deletedIds);
  out.deletedIds = deleted;
  // habits: gün -> {habitId: bool}, ikisinden birinde yapıldıysa yapıldı
  out.habits = mergeMap(local.habits, drive.habits, (ld, dd) => mergeMap(ld, dd, (a, b) => !!(a || b)));
  // grooming: id -> timestamp, en yeni kazanır
  out.grooming = mergeMap(local.grooming, drive.grooming, (a, b) => Math.max(a || 0, b || 0));
  // water: gün -> bardak sayısı, en yüksek kazanır
  out.water = mergeMap(local.water, drive.water, (a, b) => Math.max(a || 0, b || 0));
  // tasks: id -> bool, ikisinden birinde işaretliyse işaretli
  out.tasks = mergeMap(local.tasks, drive.tasks, (a, b) => !!(a || b));
  // listeler: id bazında birleşim, silinenler hariç
  if (local.habitList || drive.habitList) out.habitList = mergeList(local.habitList, drive.habitList, deleted);
  if (local.taskList || drive.taskList) out.taskList = mergeList(local.taskList, drive.taskList, deleted);
  if (local.groomingList || drive.groomingList) out.groomingList = mergeList(local.groomingList, drive.groomingList, deleted);
  return out;
}

// pull → merge → push: her senkronda iki tarafı birleştirir
async function driveSync() {
  if (!driveToken || !driveFileId) return;
  const resp = await fetch(
    `https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
    { headers: { Authorization: `Bearer ${driveToken}` } }
  );
  if (resp.status === 401) { driveToken = null; throw new Error('unauth'); }
  let driveData = {};
  if (resp.ok) {
    const text = await resp.text();
    if (text) { try { driveData = JSON.parse(text); } catch(e) { driveData = {}; } }
  } else if (resp.status !== 404) {
    throw new Error('pull ' + resp.status);
  }
  const local = load();
  const merged = mergeState(local, driveData);
  merged._lastModified = Date.now();
  try { localStorage.setItem('panel_v2', JSON.stringify(merged)); } catch(e) {}
  renderAll();
  const put = await fetch(
    `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,
    {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${driveToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(merged)
    }
  );
  if (put.status === 401) { driveToken = null; throw new Error('unauth'); }
  if (!put.ok) throw new Error('push ' + put.status);
}

function drivePush() {
  if (!driveToken || !driveFileId) return;
  clearTimeout(drivePushTimer);
  setSyncStatus('syncing');
  drivePushTimer = setTimeout(async () => {
    try {
      await driveSync();
      setSyncStatus('ok');
    } catch(e) {
      if (e.message === 'unauth') {
        driveConnect(true);
      } else {
        setSyncStatus('err');
      }
    }
  }, 1500);
}

function init() {
  migrate();
  renderAll();

  const driveConfigured = DRIVE_CLIENT_ID && !DRIVE_CLIENT_ID.startsWith('YOUR_');
  if (driveConfigured) {
    let previouslyEnabled = false;
    try { previouslyEnabled = localStorage.getItem('panel_drive_enabled') === '1'; } catch(e) {}
    if (previouslyEnabled) driveConnect(true);
    else setSyncStatus('off');
  } else {
    setSyncStatus('hidden');
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) return;
    renderAll();
    if (driveToken && driveFileId) {
      setSyncStatus('syncing');
      driveSync().then(() => setSyncStatus('ok')).catch((e) => {
        if (e && e.message === 'unauth') driveConnect(true); else setSyncStatus('err');
      });
    }
  });

  setInterval(renderGrooming, 60000);
}

init();
</script>
